name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Lint, testes e validacao Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r download/requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check download/ tests/

      - name: Testes unitarios
        run: pytest tests/ -v

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -diff

      - name: Terraform init (sem backend remoto)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

  deploy:
    name: Deploy (Databricks bundle)
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Debug secrets (temporario, nao expoe valor)
        run: |
          echo "HOST length: ${#DATABRICKS_HOST}"
          echo "HOST prefix ok: $(echo "$DATABRICKS_HOST" | grep -c '^https://dbc-')"
          echo "TOKEN length: ${#DATABRICKS_TOKEN}"
          echo "TOKEN prefix ok: $(echo "$DATABRICKS_TOKEN" | grep -c '^dapi')"

      - name: Deploy do bundle (pipeline)
        run: databricks bundle deploy
